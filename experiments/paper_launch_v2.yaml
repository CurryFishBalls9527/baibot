experiment_id: paper_launch_v2
start_date: "2026-04-13"
primary_metric: sharpe_ratio
min_trades: 20
min_days: 15
status: running

# Track P-SYNC: reconcile local SQLite trades against broker every 5 min
# during market hours. Fixes the drift where live fills / broker-side
# state updates weren't making it back into the per-variant SQLite.
reconciler_enabled: true
reconciler_interval_minutes: 5

# Six-active variant paper trading:
#   mechanical         — pure Minervini rule-based entries, ExitManager v1 (existing)
#   llm                — full agent pipeline, ExitManager v1 (existing)
#   chan (RETIRED 2026-04-27 — Alpaca paper account deleted; chan_daily uses fresh account)
#   mechanical_v2      — same as mechanical + ExitManager v2 (B1→B4L parity)
#   chan_v2            — Chan + dead money stop, MA trend filter, regime gate
#   intraday_mechanical — NR4 + gap-reclaim 15m breakout, EOD flatten
#   chan_daily         — Daily-bar Donchian + seg-BSP candidate (NEW 2026-04-27)
#                          — driven by ChanDailyOrchestrator (strategy_type=chan_daily)
#                          — auto-scheduled via swing_analysis tick (15:30 ET)
#                          — uses its own fresh Alpaca paper account
#
# Each variant uses a SEPARATE Alpaca paper account and SQLite db.
# Set these env vars in .env before running:
#   ALPACA_MECHANICAL_API_KEY,      ALPACA_MECHANICAL_SECRET_KEY
#   ALPACA_LLM_API_KEY,             ALPACA_LLM_SECRET_KEY
#   ALPACA_CHAN_API_KEY,            ALPACA_CHAN_SECRET_KEY        (RETIRED — chan v1 account deleted)
#   ALPACA_MECHANICAL_V2_API_KEY,   ALPACA_MECHANICAL_V2_SECRET_KEY
#   ALPACA_CHAN_V2_API_KEY,         ALPACA_CHAN_V2_SECRET_KEY
#   ALPACA_V2_INTRADAY_API_KEY,     ALPACA_V2_INTRADAY_SECRET_KEY
#   ALPACA_CHAN_DAILY_API_KEY,      ALPACA_CHAN_DAILY_SECRET_KEY

variants:
  - name: mechanical
    description: Rule-based Minervini entries, ExitManager exits, no LLM calls
    alpaca_api_key: "${ALPACA_MECHANICAL_API_KEY}"
    alpaca_secret_key: "${ALPACA_MECHANICAL_SECRET_KEY}"
    db_path: trading_mechanical.db
    config_overrides:
      mechanical_only_mode: true
      minervini_enabled: true

  - name: llm
    description: Full 13-call agent graph pipeline (analysts → debaters → risk) + ExitManager v2
    alpaca_api_key: "${ALPACA_LLM_API_KEY}"
    alpaca_secret_key: "${ALPACA_LLM_SECRET_KEY}"
    db_path: trading_llm.db
    config_overrides:
      mechanical_only_mode: false
      minervini_enabled: true
      # 2026-04-25: enabled v2 ExitManager. v1 only updates internal
      # current_stop; v2 calls broker.replace_order so the bracket SL leg
      # actually moves to the ratcheted price. W17 llm/AAOI gave back +14%
      # MFE → -0.06% SL because v1's ratcheted breakeven stop wasn't
      # visible to Alpaca. Same B4L parity settings as mechanical_v2.
      # Pyramid add-on intentionally NOT enabled here (untested with llm
      # signal coupling; see memory/project_pyramid_survivorship.md).
      exit_manager_version: v2
      dead_money_enabled: true
      dead_money_min_gain_pct: 0.03
      dead_money_max_days: 10
      partial_profit_fraction: 0.0
      breakeven_trigger_pct: 0.08
      breakeven_lock_offset_pct: 0.01
      regime_aware_trail: true
      trail_stop_pct_uptrend: 0.10
      trail_stop_pct_pressure: 0.10
      trail_stop_pct_correction: 0.07

  # 2026-04-27: chan variant PAUSED — chan_daily reuses this Alpaca account
  # (avoid opening a new paper account). chan v1's existing positions can stay
  # open; they'll close via their own bracket stops. chan_daily ignores any
  # held symbol not in its 16-ETF universe (single-stock chan v1 holdings are
  # safe — chan_daily skips them automatically). To resume chan v1, uncomment.
  # - name: chan
  #   description: Chan 缠论 structural signals with RS top-15% filter
  #   alpaca_api_key: "${ALPACA_CHAN_API_KEY}"
  #   alpaca_secret_key: "${ALPACA_CHAN_SECRET_KEY}"
  #   db_path: trading_chan.db
  #   config_overrides:
  #     strategy_type: chan
  #     chan_intraday_db: research_data/intraday_30m_broad.duckdb
  #     chan_daily_db: research_data/market_data.duckdb
  #     chan_rs_top_pct: 0.15
  #     chan_rs_lookback_days: 126
  #     chan_buy_types: ["T1", "T2", "T2S"]
  #     chan_filter_macd_zero: true
  #     chan_filter_divergence_max: 0.6
  #     max_positions: 8
  #     default_stop_loss_pct: 0.05
  #     default_take_profit_pct: 0.15

  - name: mechanical_v2
    description: Mechanical + ExitManager v2 (B4L parity — regime trail, breakeven +8%, dead-money, partial-off, broker stop ratcheting)
    alpaca_api_key: "${ALPACA_MECHANICAL_V2_API_KEY}"
    alpaca_secret_key: "${ALPACA_MECHANICAL_V2_SECRET_KEY}"
    db_path: trading_mechanical_v2.db
    config_overrides:
      mechanical_only_mode: true
      minervini_enabled: true
      exit_manager_version: v2
      # B1: dead-money stop
      dead_money_enabled: true
      dead_money_min_gain_pct: 0.03
      dead_money_max_days: 10
      # B2: disable partial profits, let winners run
      partial_profit_fraction: 0.0
      # B3L: breakeven at +8%, lock entry+1%
      breakeven_trigger_pct: 0.08
      breakeven_lock_offset_pct: 0.01
      # B4L: regime-dependent trail (tighten only in correction)
      regime_aware_trail: true
      trail_stop_pct_uptrend: 0.10
      trail_stop_pct_pressure: 0.10
      trail_stop_pct_correction: 0.07
      # 2026-04-23: paper-observational pyramid add-on (+2.5%/+30%, +5%/+20%).
      # Universe-ambiguous signal: seed +9.8pp 23_25 vs broad -5.4pp 23_25.
      # Kill-switch — flip false to revert without DB migration.
      # See memory/project_pyramid_survivorship.md.
      minervini_add_on_enabled: true

  - name: chan_v2
    description: Chan v2 — dead money + regime gate (asymmetric bear protection)
    alpaca_api_key: "${ALPACA_CHAN_V2_API_KEY}"
    alpaca_secret_key: "${ALPACA_CHAN_V2_SECRET_KEY}"
    db_path: trading_chan_v2.db
    config_overrides:
      strategy_type: chan
      chan_intraday_db: research_data/intraday_30m_broad.duckdb
      chan_daily_db: research_data/market_data.duckdb
      chan_rs_top_pct: 0.15
      chan_rs_lookback_days: 126
      chan_buy_types: ["T1", "T2", "T2S"]
      chan_filter_macd_zero: true
      chan_filter_divergence_max: 0.6
      max_positions: 8
      default_stop_loss_pct: 0.05
      default_take_profit_pct: 0.15
      # v2 addition: dead money at 150 bars (+10.9pp return in backtest)
      chan_dead_money_bars: 150
      chan_dead_money_min_gain: 0.05
      # 2026-04-28: regime gate (asymmetric bear protection). Block new entries
      # when SPY composite score <= 3. Validated on broad universe (R/DD 3.44 →
      # 5.61) + multi-period (2018: -18% → -7%; 2025: -29% → -19%). Cost: 2020-style
      # V-recovery returns -16pp. Reversible — delete these two lines to disable.
      chan_regime_gate_enabled: true
      chan_regime_min_score: 3

  - name: chan_daily
    description: |
      Daily-bar Donchian-30 breakout OR segment-level Chan BSP entries on 16
      macro+sector ETFs. Chan T1 sell exit + structural stop + 100-bar time stop.
      ATR-parity sizing 4x (risk 2% / position cap 25%) with momentum-priority
      queue. Driver: ChanDailyOrchestrator via swing_analysis cron (15:30 ET).
      Backtest: 9.5% annual / -11% max DD / Calmar 1.18 across 2014-2025.
      See SUMMARY_OPTIMIZATION_FINAL.md.
    alpaca_api_key: "${ALPACA_CHAN_DAILY_API_KEY}"
    alpaca_secret_key: "${ALPACA_CHAN_DAILY_SECRET_KEY}"
    db_path: trading_chan_daily.db
    config_overrides:
      strategy_type: chan_daily
      # NEW NEW OPTIMAL config from research sweeps. Do NOT change without re-running
      # backtests in scripts/sweep_chan_optimization.py + scripts/sweep_chan_phase2.py.
      # 2026-04-28: 4x sizing confirmed safe after MTM-bug fix invalidated the prior
      # "2026-04-15 risk-off" tail-risk concern (was an artifact of zeroing missing
      # data). Real 2026 YTD at 4x: +13.57% / -9.56% DD / R/DD +1.42.
      risk_per_trade: 0.020
      position_pct: 0.25       # backtester-internal sizing key (kept for parity)
      max_position_pct: 0.25   # LIVE per-position cap (read by PositionSizer + RiskEngine)
      max_total_exposure: 1.50 # 6 × 25% = 150% gross max; default 0.72 would block 4x
      max_positions: 6
      daily_db_path: research_data/market_data.duckdb
      chan_daily_universe:
        [SPY, QQQ, IWM, DIA, GLD, SLV, TLT, USO,
         XLF, XLE, XLK, XLV, XLI, XLY, XLP, XLU]

  - name: intraday_mechanical
    description: ORB + NR4 + gap-reclaim 15m breakout on broad250, EOD flatten
    alpaca_api_key: "${ALPACA_V2_INTRADAY_API_KEY}"
    alpaca_secret_key: "${ALPACA_V2_INTRADAY_SECRET_KEY}"
    db_path: trading_intraday_mechanical.db
    config_overrides:
      strategy_type: intraday_mechanical
      # Lookahead bug in daily_trend_filter (`<=` not `<`) was the entire
      # 2.14 R/DD edge; post-fix backtest is no-edge across all 3 periods.
      # Flipped back to live 2026-04-22 at user request — for observational
      # purposes, not because we reclaimed edge. Feedback loop's daily
      # review will surface what the trades actually look like live.
      # See memory/project_intraday_lookahead_blowup.md.
      intraday_dry_run: false
      intraday_universe_path: research_data/intraday_top250_universe.json
      intraday_lookback_days: 7
      intraday_allowed_families:
        - gap_reclaim_long
        - nr4_breakout
        - orb_breakout
      # ORB sweep winner: orb_vol_2.5 (R/DD 2.14 / 0.50 / 0.88 on 2023-25 / 2020 / 2018,
      # all DDs <43%). Adds 2023-25 alpha without collapsing on 2018 like orb_base does.
      # See scripts/run_intraday_orb_tightening.py.
      intraday_backtest_config:
        initial_cash: 100000
        max_positions: 6
        max_position_pct: 0.20
        stop_loss_pct: 0.03
        trail_stop_pct: 0.04
        opening_range_bars: 2
        require_above_prior_high: true
        latest_entry_bar_in_session: 20
        max_trades_per_symbol_per_day: 1
        min_volume_ratio: 1.5
        continuation_min_volume_ratio: 2.0
        continuation_max_distance_from_vwap_pct: 0.005
        continuation_latest_entry_bar_in_session: 8
        allow_continuation_setup: false
        allow_overextended_setup: false
        allow_expansion_setup: false
        allow_pullback_vwap: false
        allow_gap_reclaim_long: true
        gap_reclaim_min_gap_down_pct: 0.012
        gap_reclaim_max_gap_down_pct: 0.06
        gap_reclaim_min_reclaim_fraction: 0.5
        gap_reclaim_min_volume_ratio: 1.3
        gap_reclaim_earliest_entry_bar: 2
        gap_reclaim_latest_entry_bar: 8
        allow_nr4_breakout: true
        nr4_lookback_days: 4
        nr4_earliest_entry_bar: 1
        nr4_latest_entry_bar: 12
        nr4_min_volume_ratio: 1.3
        allow_orb_breakout: true
        orb_range_bars: 2
        orb_min_volume_ratio: 2.5
        orb_min_breakout_distance_pct: 0.001
        orb_earliest_entry_bar: 2
        orb_latest_entry_bar: 10
        orb_require_above_vwap: true
        require_above_vwap: true
        flatten_at_close: true
        interval_minutes: 15
        daily_trend_filter: true
        daily_trend_sma: 20
        # 1/5 bps is the realistic cost floor we validated against
        execution_half_spread_bps: 1.0
        execution_stop_slippage_bps: 5.0
        # 2026-04-25: Minervini SPY regime gate (close > SMA50 AND > SMA200
        # AND SMA200 rising). Blocks the whole intraday scan on days when
        # the prior session is not confirmed_uptrend. Backtest evidence:
        # IS R/DD 2.31 → 2.64; 2020 OOS -13.87% → -11.22%; 2018 OOS
        # -3.70% → -1.45%. Probe passes (no lookahead). Trade count drops
        # ~30-40%. Both OOS still negative — strategy remains fair-weather
        # but less bad. See memory/project_intraday_minervini_gate.md.
        minervini_regime_filter: confirmed_uptrend_only
        # Minervini regime needs SPY daily history; the orchestrator's
        # warehouse path is set here (defaults to research_data/market_data.duckdb
        # in IntradayBacktestConfig — keep that default for live use).
      # Sizer/risk parameters for the orchestrator layer
      max_positions: 6
      default_stop_loss_pct: 0.03
      default_take_profit_pct: 1.0
