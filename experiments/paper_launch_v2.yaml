experiment_id: paper_launch_v2
start_date: "2026-04-13"
primary_metric: sharpe_ratio
min_trades: 20
min_days: 15
status: running

# Track P-SYNC: reconcile local SQLite trades against broker every 5 min
# during market hours. Fixes the drift where live fills / broker-side
# state updates weren't making it back into the per-variant SQLite.
reconciler_enabled: true
reconciler_interval_minutes: 5

# Six-variant paper trading:
#   mechanical         — pure Minervini rule-based entries, ExitManager v1 (existing)
#   llm                — full agent pipeline, ExitManager v1 (existing)
#   chan               — Chan 缠论 structural signals + RS filter (existing)
#   mechanical_v2      — same as mechanical + ExitManager v2 (B1→B4L parity)
#   chan_v2            — Chan + dead money stop, MA trend filter, regime gate
#   intraday_mechanical — NR4 + gap-reclaim 15m breakout, EOD flatten (new)
#
# Each variant uses a SEPARATE Alpaca paper account and SQLite db.
# Set these env vars in .env before running:
#   ALPACA_MECHANICAL_API_KEY,      ALPACA_MECHANICAL_SECRET_KEY
#   ALPACA_LLM_API_KEY,             ALPACA_LLM_SECRET_KEY
#   ALPACA_CHAN_API_KEY,            ALPACA_CHAN_SECRET_KEY
#   ALPACA_MECHANICAL_V2_API_KEY,   ALPACA_MECHANICAL_V2_SECRET_KEY
#   ALPACA_CHAN_V2_API_KEY,         ALPACA_CHAN_V2_SECRET_KEY
#   ALPACA_V2_INTRADAY_API_KEY,     ALPACA_V2_INTRADAY_SECRET_KEY

variants:
  - name: mechanical
    description: Rule-based Minervini entries, ExitManager exits, no LLM calls
    alpaca_api_key: "${ALPACA_MECHANICAL_API_KEY}"
    alpaca_secret_key: "${ALPACA_MECHANICAL_SECRET_KEY}"
    db_path: trading_mechanical.db
    config_overrides:
      mechanical_only_mode: true
      minervini_enabled: true

  - name: llm
    description: Full 13-call agent graph pipeline (analysts → debaters → risk)
    alpaca_api_key: "${ALPACA_LLM_API_KEY}"
    alpaca_secret_key: "${ALPACA_LLM_SECRET_KEY}"
    db_path: trading_llm.db
    config_overrides:
      mechanical_only_mode: false
      minervini_enabled: true

  - name: chan
    description: Chan 缠论 structural signals with RS top-15% filter
    alpaca_api_key: "${ALPACA_CHAN_API_KEY}"
    alpaca_secret_key: "${ALPACA_CHAN_SECRET_KEY}"
    db_path: trading_chan.db
    config_overrides:
      strategy_type: chan
      chan_intraday_db: research_data/intraday_30m_broad.duckdb
      chan_daily_db: research_data/market_data.duckdb
      chan_rs_top_pct: 0.15
      chan_rs_lookback_days: 126
      chan_buy_types: ["T1", "T2", "T2S"]
      chan_filter_macd_zero: true
      chan_filter_divergence_max: 0.6
      max_positions: 8
      default_stop_loss_pct: 0.05
      default_take_profit_pct: 0.15

  - name: mechanical_v2
    description: Mechanical + ExitManager v2 (B4L parity — regime trail, breakeven +8%, dead-money, partial-off, broker stop ratcheting)
    alpaca_api_key: "${ALPACA_MECHANICAL_V2_API_KEY}"
    alpaca_secret_key: "${ALPACA_MECHANICAL_V2_SECRET_KEY}"
    db_path: trading_mechanical_v2.db
    config_overrides:
      mechanical_only_mode: true
      minervini_enabled: true
      exit_manager_version: v2
      # B1: dead-money stop
      dead_money_enabled: true
      dead_money_min_gain_pct: 0.03
      dead_money_max_days: 10
      # B2: disable partial profits, let winners run
      partial_profit_fraction: 0.0
      # B3L: breakeven at +8%, lock entry+1%
      breakeven_trigger_pct: 0.08
      breakeven_lock_offset_pct: 0.01
      # B4L: regime-dependent trail (tighten only in correction)
      regime_aware_trail: true
      trail_stop_pct_uptrend: 0.10
      trail_stop_pct_pressure: 0.10
      trail_stop_pct_correction: 0.07

  - name: chan_v2
    description: Chan v2 — dead money stop at 150 bars (only validated improvement)
    alpaca_api_key: "${ALPACA_CHAN_V2_API_KEY}"
    alpaca_secret_key: "${ALPACA_CHAN_V2_SECRET_KEY}"
    db_path: trading_chan_v2.db
    config_overrides:
      strategy_type: chan
      chan_intraday_db: research_data/intraday_30m_broad.duckdb
      chan_daily_db: research_data/market_data.duckdb
      chan_rs_top_pct: 0.15
      chan_rs_lookback_days: 126
      chan_buy_types: ["T1", "T2", "T2S"]
      chan_filter_macd_zero: true
      chan_filter_divergence_max: 0.6
      max_positions: 8
      default_stop_loss_pct: 0.05
      default_take_profit_pct: 0.15
      # v2 addition: dead money at 150 bars (+10.9pp return in backtest)
      chan_dead_money_bars: 150
      chan_dead_money_min_gain: 0.05

  - name: intraday_mechanical
    description: NR4 + gap-reclaim 15m breakout, EOD flatten (dry-run default)
    alpaca_api_key: "${ALPACA_V2_INTRADAY_API_KEY}"
    alpaca_secret_key: "${ALPACA_V2_INTRADAY_SECRET_KEY}"
    db_path: trading_intraday_mechanical.db
    config_overrides:
      strategy_type: intraday_mechanical
      intraday_dry_run: false
      intraday_universe_path: research_data/spike_universe.json
      intraday_lookback_days: 7
      intraday_allowed_families:
        - gap_reclaim_long
        - nr4_breakout
      # Exact config of the winning gap12 + NR4 vol=2.0 combo
      # (see memory/project_nr4_finding.md — OOS validated on 2020/2018).
      intraday_backtest_config:
        initial_cash: 100000
        max_positions: 6
        max_position_pct: 0.20
        stop_loss_pct: 0.03
        trail_stop_pct: 0.04
        opening_range_bars: 2
        require_above_prior_high: true
        latest_entry_bar_in_session: 20
        max_trades_per_symbol_per_day: 1
        min_volume_ratio: 1.5
        continuation_min_volume_ratio: 2.0
        continuation_max_distance_from_vwap_pct: 0.005
        continuation_latest_entry_bar_in_session: 8
        allow_continuation_setup: false
        allow_overextended_setup: true
        allow_expansion_setup: true
        allow_gap_reclaim_long: true
        gap_reclaim_min_gap_down_pct: 0.012
        gap_reclaim_max_gap_down_pct: 0.06
        gap_reclaim_min_reclaim_fraction: 0.5
        gap_reclaim_min_volume_ratio: 1.3
        gap_reclaim_earliest_entry_bar: 2
        gap_reclaim_latest_entry_bar: 8
        allow_nr4_breakout: true
        nr4_lookback_days: 4
        nr4_earliest_entry_bar: 1
        nr4_latest_entry_bar: 12
        nr4_min_volume_ratio: 2.0
        require_above_vwap: true
        flatten_at_close: true
        interval_minutes: 15
        daily_trend_filter: true
        daily_trend_sma: 20
        # 1/5 bps is the realistic cost floor we validated against
        execution_half_spread_bps: 1.0
        execution_stop_slippage_bps: 5.0
      # Sizer/risk parameters for the orchestrator layer
      max_positions: 6
      default_stop_loss_pct: 0.03
      default_take_profit_pct: 1.0
